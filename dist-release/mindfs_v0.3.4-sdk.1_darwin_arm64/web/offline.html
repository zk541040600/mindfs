<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>MindFS Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
        background: #e2e8f0;
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(15, 23, 42, 0.12), transparent 45%),
          linear-gradient(180deg, #f8fafc 0%, #e2e8f0 100%);
      }

      main {
        width: min(420px, 100%);
        padding: 32px 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.86);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #334155;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前离线</h1>
      <p>MindFS 已安装为 PWA，但这次请求没有命中可用缓存。恢复网络后重新打开，离线能力会继续增强。</p>
    </main>
  </body>
</html>
