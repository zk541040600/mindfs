<svg width="256" height="257" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景：圆角矩形 -->
  <rect width="400" height="400" rx="80" fill="#8B4BFF"/>
  
  <!-- 幽灵主体：整体坐标向左上方偏移，使其在 400x400 空间内居中 -->
  <path fill="white" d="
    M 75,200 
    C 75,120 125,70 205,70 
    C 285,70 330,120 330,210 
    C 330,270 320,295 295,290 
    C 275,325 235,320 215,290 
    C 195,330 145,330 125,295 
    C 95,320 75,300 75,250 
    Z"
  />

  <!-- 眼睛：随身体位置同步居中调整 -->
  <ellipse cx="218" cy="175" rx="15" ry="25" fill="black"/>
  <ellipse cx="275" cy="175" rx="15" ry="25" fill="black"/>
</svg>
