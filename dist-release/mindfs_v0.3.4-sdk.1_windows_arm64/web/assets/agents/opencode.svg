<svg width="256" height="257" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 背景渐变：深灰到纯黑 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>
    
    <!-- 边框渐变：模拟银色金属质感 -->
    <linearGradient id="frameGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEFEFE;stop-opacity:1" />
      <stop offset="10%" style="stop-color:#DEDEDE;stop-opacity:1" />
      <stop offset="90%" style="stop-color:#CCCCCC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AAAAAA;stop-opacity:1" />
    </linearGradient>

    <!-- 内凹区域渐变：具有深度的阴影 -->
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000;stop-opacity:1" />
      <stop offset="35%" style="stop-color:#222;stop-opacity:1" />
      <stop offset="36%" style="stop-color:#333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111;stop-opacity:1" />
    </linearGradient>

    <!-- 外部阴影 -->
    <filter id="outerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- 主圆角背景 -->
  <rect x="20" y="20" width="360" height="360" rx="80" fill="url(#bgGrad)" filter="url(#outerShadow)" />

  <!-- 银色边框 -->
  <rect x="100" y="70" width="200" height="260" fill="url(#frameGrad)" />
  
  <!-- 边框上的细微高光和阴影 -->
  <line x1="100" y1="70" x2="300" y2="70" stroke="white" stroke-width="1.5" stroke-opacity="0.8" />
  <line x1="100" y1="330" x2="300" y2="330" stroke="black" stroke-width="2" stroke-opacity="0.5" />

  <!-- 内凹黑色区域 -->
  <rect x="150" y="120" width="100" height="160" fill="url(#innerGrad)" />
  
  <!-- 内凹区域的内阴影效果 -->
  <rect x="150" y="120" width="100" height="160" fill="none" stroke="black" stroke-width="4" stroke-opacity="0.6" />
  <rect x="152" y="122" width="96" height="156" fill="none" stroke="white" stroke-width="0.5" stroke-opacity="0.1" />

</svg>
