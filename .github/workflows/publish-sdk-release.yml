name: Publish SDK release

on:
  push:
    branches:
      - mindfs-release-v0.3.4-sdk.1

permissions:
  contents: write

concurrency:
  group: publish-sdk-release-v0.3.4-sdk.1
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: v0.3.4-sdk.1
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web assets
        run: |
          npm ci --prefix web
          npm run build --prefix web

      - name: Build release archives
        run: |
          bash scripts/build-all.sh "$RELEASE_TAG" dist-release

      - name: Prepare release notes
        run: |
          awk 'NR > 1 && /^# MindFS[[:space:]]+/ { exit } { print }' release-notes.md > /tmp/release-notes-latest.md
          test -s /tmp/release-notes-latest.md

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifacts=(dist-release/*.tar.gz dist-release/*.zip)
          test "${#artifacts[@]}" -eq 7
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${artifacts[@]}" --clobber
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file /tmp/release-notes-latest.md \
              --draft=false \
              --prerelease=false
          else
            gh release create "$RELEASE_TAG" "${artifacts[@]}" \
              --title "$RELEASE_TAG" \
              --notes-file /tmp/release-notes-latest.md \
              --draft=false \
              --prerelease=false
          fi
